{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies - Smart Placement Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
  <style>
    :root {
      --teal:      #0aa3b5;
      --teal-dark: #088a9a;
      --teal-dim:  rgba(10,163,181,0.12);
      --ink:       #0d1b2a;
      --slate:     #3a4a5c;
      --muted:     #7a8fa8;
      --surface:   #ffffff;
      --bg:        #eaf1f6;
      --border:    #d6e4ed;
      --gradient:  linear-gradient(135deg,#0aa3b5 0%,#088a9a 100%);
      --glow:      0 0 40px rgba(10,163,181,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%,rgba(10,163,181,0.06) 0%,transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 80%,rgba(8,138,154,0.06) 0%,transparent 60%);
      pointer-events:none; z-index:0;
    }
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 32px; height: 62px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(10,163,181,0.07);
      flex-shrink: 0;
    }
    .navbar-brand {
      font-family: 'Syne', sans-serif; 
      font-weight: 800; 
      font-size: 1.1rem;
      color: #0aa3b5;
      white-space: nowrap;
      display: flex;align-items: center;
      gap: 8px;
    }
    .navbar-links { display: flex; align-items: center; gap: 4px; }
    .navbar-links a {
      color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 500;
      padding: 6px 12px; border-radius: 8px; transition: all 0.2s; white-space: nowrap;
    }
    .navbar-links a:hover { color: var(--slate); background: var(--teal-dim); }
    .navbar-links a.active { color: var(--teal); background: var(--teal-dim); }
    .navbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .main { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:40px 24px 60px; }
    .page-header { margin-bottom:28px; animation:fadeUp 0.5s ease both; text-align:center; }
    .page-header h1 { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; letter-spacing:-0.5px; color:var(--ink); }
    .page-header p  { color:var(--muted); font-size:0.9rem; margin-top:4px; }

    .companies-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:24px; margin:0 auto; max-width:960px; }

    .company-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; overflow:hidden; box-shadow:var(--glow);
      transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
      animation:fadeUp 0.5s ease both; display:flex; flex-direction:column;
      width:100%; max-width:440px; flex:1 1 380px;
    }
    .company-card:hover { transform:translateY(-4px); box-shadow:0 12px 36px rgba(10,163,181,0.14); border-color:rgba(10,163,181,0.3); }
    .card-banner {
      height:90px; display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-size:2rem; font-weight:800;
      letter-spacing:-1px; color:white; position:relative; overflow:hidden;
      background:var(--gradient);
    }
    .card-banner::after {
      content:''; position:absolute; inset:0;
      background:rgba(255,255,255,0.07);
      background-image:radial-gradient(circle at 80% 20%,rgba(255,255,255,0.15) 0%,transparent 60%);
    }
    .card-body  { padding:20px 24px 16px; display:flex; flex-direction:column; gap:12px; flex:1; }
    .company-top { display:flex; align-items:flex-start; gap:12px; }
    .company-logo {
      width:44px; height:44px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-weight:800; font-size:0.95rem; color:white; flex-shrink:0;
      background:var(--gradient);
    }
    .company-title h3 { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:var(--ink); margin-bottom:5px; }
    .company-industry {
      display:inline-flex; align-items:center; gap:5px;
      font-size:0.72rem; font-weight:600; color:var(--teal);
      background:var(--teal-dim); padding:3px 10px; border-radius:20px;
      border:1px solid rgba(10,163,181,0.2);
    }
    .card-stats { display:flex; gap:8px; flex-wrap:wrap; }
    .stat-pill {
      display:flex; align-items:center; gap:5px; font-size:0.75rem; font-weight:500;
      color:var(--slate); background:var(--bg); border:1px solid var(--border);
      padding:4px 10px; border-radius:20px;
    }
    .stat-pill i { font-size:0.65rem; color:var(--teal); }
    .company-desc { font-size:0.83rem; color:var(--slate); line-height:1.65; border-top:1px solid var(--border); padding-top:12px; }
    .company-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 24px 18px; border-top:1px solid var(--border); gap:8px;
    }
    .visit-btn {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 16px; background:var(--gradient); color:white; text-decoration:none;
      border-radius:10px; font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700;
      box-shadow:0 4px 14px rgba(10,163,181,0.25); border:none; cursor:pointer;
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .visit-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(10,163,181,0.38); color:white; }
    .detail-btn {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 20px; background:var(--teal-dim); color:var(--teal);
      border-radius:30px; font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700;
      border:1.5px solid rgba(10,163,181,0.25); cursor:pointer; transition:all 0.2s;
    }
    .detail-btn:hover { background:rgba(10,163,181,0.2); }

    /* MODAL */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:300;
      background:rgba(13,27,42,0.6); backdrop-filter:blur(8px);
      align-items:flex-start; justify-content:center; padding:30px 20px; overflow-y:auto;
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:var(--surface); border-radius:24px; width:100%; max-width:700px; margin:auto;
      overflow:hidden; box-shadow:0 30px 80px rgba(10,163,181,0.2);
      animation:fadeUp 0.3s ease both; position:relative;
    }
    .modal-banner {
      height:120px; display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-size:2.6rem; font-weight:800;
      color:white; letter-spacing:-1px; position:relative;
    }
    .modal-banner::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at 75% 25%,rgba(255,255,255,0.18) 0%,transparent 55%);
    }
    .modal-close {
      position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,0.25); border:none; color:white; font-size:1rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      z-index:10; transition:background 0.2s;
    }
    .modal-close:hover { background:rgba(255,255,255,0.4); }
    .modal-body { padding:28px 32px 32px; }
    .modal-header-info { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .modal-logo {
      width:54px; height:54px; border-radius:14px; display:flex; align-items:center;
      justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem;
      color:white; flex-shrink:0;
    }
    .modal-company-name { font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:800; color:var(--ink); }
    .modal-company-sub  { font-size:0.82rem; color:var(--muted); margin-top:3px; }
    .section-label {
      font-size:0.68rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .section-block { margin-bottom:22px; }
    .about-text { font-size:0.85rem; color:var(--slate); line-height:1.75; }
    .key-facts  { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .fact-chip  {
      display:flex; align-items:center; gap:6px; background:var(--bg);
      border:1px solid var(--border); border-radius:10px; padding:6px 12px;
      font-size:0.78rem; color:var(--slate);
    }
    .fact-chip i      { color:var(--teal); font-size:0.7rem; }
    .fact-chip strong { color:var(--ink); }
    .req-grid  { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .req-item  { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:10px 14px; }
    .req-key   { font-size:0.7rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:3px; }
    .req-val   { font-size:0.85rem; font-weight:600; color:var(--ink); }
    .roles-row { display:flex; gap:10px; flex-wrap:wrap; }
    .role-card { flex:1; min-width:140px; border-radius:14px; padding:14px 16px; border:1px solid var(--border); }
    .role-title     { font-family:'Syne',sans-serif; font-size:0.82rem; font-weight:700; color:var(--ink); margin-bottom:4px; }
    .role-pkg       { font-size:1.1rem; font-weight:700; color:var(--teal); font-family:'Syne',sans-serif; }
    .role-pkg-label { font-size:0.7rem; color:var(--muted); margin-top:2px; }
    .step-list { display:flex; flex-direction:column; gap:0; }
    .step-item { display:flex; gap:14px; position:relative; }
    .step-item:not(:last-child)::before {
      content:''; position:absolute; left:15px; top:32px;
      width:2px; height:calc(100% - 10px); background:var(--border);
    }
    .step-num {
      width:32px; height:32px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-family:'Syne',sans-serif; font-size:0.78rem; font-weight:700;
      flex-shrink:0; z-index:1; margin-top:2px;
    }
    .step-content { padding-bottom:18px; flex:1; }
    .step-title   { font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:700; color:var(--ink); margin-bottom:3px; }
    .step-desc    { font-size:0.8rem; color:var(--slate); line-height:1.6; }
    .topics-row   { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }

    .practice-test-btn {
      display:inline-flex; align-items:center; gap:6px;
      font-size:0.73rem; font-weight:700; background:var(--teal); color:#fff;
      padding:7px 13px; border-radius:20px; text-decoration:none;
      transition:all 0.18s; box-shadow:0 2px 8px rgba(10,163,181,0.3);
      cursor:pointer;
    }
    .practice-test-btn:hover { background:var(--teal-dark); transform:translateY(-2px); color:#fff; }
    .practice-test-btn i { font-size:0.65rem; }
    .q-badge {
      background:rgba(255,255,255,0.28); color:#fff;
      font-size:0.58rem; font-weight:800; padding:2px 6px; border-radius:99px;
    }
    .practice-note {
      margin-top:10px; background:rgba(10,163,181,0.07);
      border:1px dashed rgba(10,163,181,0.35); border-radius:10px;
      padding:8px 12px; font-size:0.76rem; color:var(--teal-dark);
      display:flex; align-items:center; gap:7px;
    }
    .tips-list { display:flex; flex-direction:column; gap:8px; }
    .tip-item  { display:flex; align-items:flex-start; gap:10px; font-size:0.82rem; color:var(--slate); line-height:1.55; }
    .tip-item i { color:var(--teal); font-size:0.75rem; margin-top:3px; flex-shrink:0; }
    .modal-footer {
      display:flex; gap:10px; justify-content:flex-end;
      padding-top:8px; border-top:1px solid var(--border); margin-top:4px;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .company-card:nth-child(1) { animation-delay:0.05s; }
    .company-card:nth-child(2) { animation-delay:0.10s; }
  </style>
</head>

/* ══════════════════════════════════════════
   RENDER CARDS
══════════════════════════════════════════ */
function renderCards() {
  const grid = document.getElementById('companiesGrid');
  grid.innerHTML = COMPANIES.map(c => `
    <div class="company-card">
      <div class="card-banner" style="background:${c.bannerBg}">
        ${c.bannerText}
      </div>
      <div class="card-body">
        <div class="company-top">
          <div class="company-logo" style="background:${c.logoBg}">${c.logoText}</div>
          <div class="company-title">
            <h3>${c.name}</h3>
            <span class="company-industry"><i class="fas fa-industry" style="font-size:0.62rem;"></i> ${c.industry}</span>
          </div>
        </div>
        <div class="card-stats">
          <span class="stat-pill"><i class="fas fa-users"></i> ${c.employees} Employees</span>
          <span class="stat-pill"><i class="fas fa-globe"></i> ${c.countries} Countries</span>
          <span class="stat-pill"><i class="fas fa-indian-rupee-sign"></i> ${c.salary}</span>
        </div>
        <p class="company-desc">${c.description}</p>
      </div>
      <div class="company-footer">
        <button class="detail-btn" onclick="openModal('${c.id}')">
          <i class="fas fa-circle-info" style="font-size:0.68rem;"></i> Details
        </button>
        <div style="display:flex; gap:6px;">
          <a href="${URL_INTERVIEW}?company=${encodeURIComponent(c.name)}&type=hr"
             class="visit-btn" style="background:var(--teal); padding:8px 12px;">
            <i class="fas fa-video"></i> HR
          </a>
          <a href="${URL_INTERVIEW}?company=${encodeURIComponent(c.name)}&type=technical"
             class="visit-btn" style="background:var(--slate); padding:8px 12px;">
            <i class="fas fa-code"></i> Tech
          </a>
        </div>
      </div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
function openModal(id) {
  const c = COMPANIES.find(x => x.id === id);
  if (!c) return;

  document.getElementById('modalBanner').style.background = c.bannerBg;
  document.getElementById('modalBannerText').textContent  = c.bannerText;
  document.getElementById('modalLogo').style.background   = c.logoBg;
  document.getElementById('modalLogo').textContent        = c.logoText;
  document.getElementById('modalName').textContent        = c.name;
  document.getElementById('modalSub').textContent         = c.industry;

  const factsHTML = c.facts.map(f =>
    `<div class="fact-chip"><i class="fas ${f.icon}"></i>${f.label}: <strong>${f.val}</strong></div>`
  ).join('');

  const rolesHTML = c.roles.map(r =>
    `<div class="role-card" style="background:${c.accent}12;border-color:${c.accent}30;">
      <div class="role-title">${r.title}</div>
      <div class="role-pkg" style="color:${c.accent};">${r.pkg}</div>
      <div class="role-pkg-label">${r.label}</div>
    </div>`
  ).join('');

  const reqHTML = c.requirements.map(([k,v]) =>
    `<div class="req-item"><div class="req-key">${k}</div><div class="req-val">${v}</div></div>`
  ).join('');

  const stepsHTML = c.steps.map((s, i) => {
    /* ── TOPIC BUTTONS — each is an <a> that goes to test page ── */
    const testsHTML = (s.tests || []).length
      ? `<div class="topics-row">
          ${s.tests.map(t =>
            `<a href="${URL_TEST}?topic=${encodeURIComponent(t.topic)}"
                class="practice-test-btn"
                onclick="closeModal()">
              <i class="fas ${t.icon}"></i> ${t.label} <span class="q-badge">10 Qs</span>
            </a>`
          ).join('')}
        </div>
        <div class="practice-note">
          <i class="fas fa-circle-info"></i>
          Click any topic to take a 10-question practice test!
        </div>`
      : '';

    /* ── VIRTUAL INTERVIEW BUTTONS ── */
    const virtualHTML = s.is_virtual_interview
      ? `<div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
          <a href="${URL_INTERVIEW}?company=${encodeURIComponent(s.company)}&type=hr"
             class="visit-btn" style="text-decoration:none; background:var(--teal); color:white;">
            <i class="fas fa-video"></i> Start HR Round
          </a>
          <a href="${URL_INTERVIEW}?company=${encodeURIComponent(s.company)}&type=technical"
             class="visit-btn" style="text-decoration:none; background:var(--slate); color:white;">
            <i class="fas fa-code"></i> Start Tech Round
          </a>
        </div>`
      : '';

    return `
      <div class="step-item">
        <div class="step-num" style="background:${c.accent}18;color:${c.accent};">${i+1}</div>
        <div class="step-content">
          <div class="step-title">${s.title}</div>
          <div class="step-desc">${s.desc}</div>
          ${testsHTML}
          ${virtualHTML}
        </div>
      </div>`;
  }).join('');

  const tipsHTML = c.tips.map(t =>
    `<div class="tip-item"><i class="fas fa-circle-check"></i><span>${t}</span></div>`
  ).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="section-block">
      <div class="section-label">About the Company</div>
      <p class="about-text">${c.about}</p>
      <div class="key-facts">${factsHTML}</div>
    </div>
    <div class="section-block">
      <div class="section-label">Fresher Roles &amp; Packages</div>
      <div class="roles-row">${rolesHTML}</div>
    </div>
    <div class="section-block">
      <div class="section-label">Eligibility Criteria</div>
      <div class="req-grid">${reqHTML}</div>
    </div>
    <div class="section-block">
      <div class="section-label">Interview Process</div>
      <div class="step-list">${stepsHTML}</div>
    </div>
    <div class="section-block">
      <div class="section-label">Preparation Tips</div>
      <div class="tips-list">${tipsHTML}</div>
    </div>
    <div class="modal-footer">
      <a href="${c.website}" target="_blank" class="visit-btn" style="text-decoration:none;">
        <i class="fas fa-arrow-up-right-from-square" style="font-size:0.68rem;"></i> Apply on Careers Page
      </a>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── Auto-open from URL param ── */
window.addEventListener('load', () => {
  renderCards();
  const open = new URLSearchParams(window.location.search).get('open');
  if (open) openModal(open);
});
</script>
</body>
</html>
