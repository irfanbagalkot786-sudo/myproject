{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Smart Placement Portal</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:      #0aa3b5;
    --teal-dark: #088a9a;
    --teal-dim:  rgba(10,163,181,0.12);
    --ink:       #0d1b2a;
    --slate:     #3a4a5c;
    --muted:     #7a8fa8;
    --surface:   #ffffff;
    --bg:        #eaf1f6;
    --border:    #d6e4ed;
    --gradient:  linear-gradient(135deg, #0aa3b5 0%, #088a9a 100%);
    --glow:      0 0 40px rgba(10,163,181,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 520px; height: 520px;
    background: var(--teal);
    top: -160px; right: -100px;
    animation: drift1 12s ease-in-out infinite alternate;
  }
  body::after {
    width: 380px; height: 380px;
    background: #088a9a;
    bottom: -120px; left: -80px;
    animation: drift2 15s ease-in-out infinite alternate;
  }

  @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(30px, 40px) scale(1.08); } }
  @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-25px, -30px) scale(1.05); } }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(10,163,181,0.13) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  /* ── BACK TO HOME BUTTON ── */
  .back-home {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    background: rgba(255,255,255,0.92);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate);
    text-decoration: none;
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(10,163,181,0.08);
    transition: all 0.2s;
  }
  .back-home:hover {
    background: var(--teal-dim);
    border-color: var(--teal);
    color: var(--teal);
    transform: translateX(-2px);
  }
  .back-home svg {
    transition: transform 0.2s;
  }
  .back-home:hover svg {
    transform: translateX(-3px);
  }

  .login-card {
    position: relative; z-index: 10;
    width: 100%; max-width: 440px;
    background: var(--surface);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(13,27,42,0.10), var(--glow);
    overflow: hidden;
    animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(36px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    background: var(--gradient);
    padding: 38px 40px 32px;
    position: relative;
    overflow: hidden;
  }
  .card-header::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    right: -50px; top: -60px;
  }
  .card-header::before {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    left: -20px; bottom: -30px;
  }

  .portal-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .portal-label span {
    display: inline-block;
    width: 20px; height: 1.5px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
  }

  .card-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
    position: relative; z-index: 1;
  }
  .card-header h1 em {
    font-style: normal;
    color: rgba(255,255,255,0.65);
    font-weight: 700;
  }

  .card-body {
    padding: 36px 40px 40px;
  }

  .messages {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg-error {
    background: #fff2f2;
    border: 1px solid #fecaca;
    border-left: 4px solid #ef4444;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #b91c1c;
    font-weight: 500;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    transition: color 0.2s;
  }
  .input-wrap:focus-within .input-icon { color: var(--teal); }

  .field input[type="text"],
  .field input[type="password"] {
    width: 100%;
    height: 48px;
    padding: 0 14px 0 42px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .field input[type="text"]::placeholder,
  .field input[type="password"]::placeholder { color: var(--muted); }
  .field input[type="text"]:focus,
  .field input[type="password"]:focus {
    border-color: var(--teal);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--teal-dim);
  }

  .captcha-wrap {
    margin-bottom: 24px;
  }
  .captcha-wrap label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 7px;
  }
  .captcha-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .captcha-display {
    flex-shrink: 0;
    width: 140px;
    height: 48px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    cursor: default;
    user-select: none;
  }
  .captcha-display canvas {
    display: block;
    width: 140px;
    height: 48px;
  }

  .captcha-answer-input {
    flex: 1;
    height: 48px;
    padding: 0 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .captcha-answer-input::placeholder { color: var(--muted); }
  .captcha-answer-input:focus {
    border-color: var(--teal);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--teal-dim);
  }

  .captcha-refresh {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--teal);
    transition: background 0.2s, border-color 0.2s;
  }
  .captcha-refresh:hover {
    background: var(--teal-dim);
    border-color: var(--teal);
  }

  .captcha-error {
    display: none;
    margin-top: 7px;
    font-size: 13px;
    color: #b91c1c;
    font-weight: 500;
  }

  .btn-login {
    width: 100%;
    height: 50px;
    background: var(--gradient);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 4px 18px rgba(10,163,181,0.30);
    letter-spacing: 0.02em;
  }
  .btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(10,163,181,0.38);
  }
  .btn-login:hover::after { background: rgba(255,255,255,0.07); }
  .btn-login:active { transform: translateY(0); }

  .btn-login svg {
    vertical-align: middle;
    margin-left: 8px;
    transition: transform 0.2s;
  }
  .btn-login:hover svg { transform: translateX(4px); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 26px 0 0;
  }
  .divider hr {
    flex: 1; border: none;
    border-top: 1px solid var(--border);
  }
  .divider span {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .register-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13.5px;
    color: var(--muted);
  }
  .register-link a {
    color: var(--teal);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1.5px solid transparent;
    transition: border-color 0.2s;
  }
  .register-link a:hover { border-color: var(--teal); }

  @media (max-width: 480px) {
    .login-card { border-radius: 0; min-height: 100vh; }
    .card-header { padding: 30px 24px 26px; }
    .card-body { padding: 28px 24px 32px; }
    .back-home { top: 12px; left: 12px; padding: 7px 12px; font-size: 12px; }
  }
</style>
</head>

<body>
<div class="bg-grid"></div>

<!-- BACK TO HOME BUTTON -->
<a href="{% url 'home' %}" class="back-home">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 12H5M12 5l-7 7 7 7"/>
  </svg>
  Back to Home
</a>

<div class="login-card">

  <div class="card-header">
    <p class="portal-label"><span></span>Smart Placement Portal</p>
    <h1>Login</h1>
  </div>

  <div class="card-body">

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="msg-error">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST" autocomplete="off" id="login-form">
      {% csrf_token %}

      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>

      <!-- ── CAPTCHA ── -->
      <div class="captcha-wrap">
        <label>Verify you're human</label>
        <div class="captcha-row">
          <div class="captcha-display">
            <canvas id="captcha-canvas" width="140" height="48"></canvas>
          </div>
          <input
            type="text"
            id="captcha-answer"
            class="captcha-answer-input"
            placeholder="Enter captcha"
            autocomplete="off"
            maxlength="8"
          >
          <button type="button" class="captcha-refresh" onclick="generateCaptcha()" title="Refresh captcha">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"/>
              <path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
        <div class="captcha-error" id="captcha-error">Incorrect captcha, please try again.</div>
      </div>

      <button type="submit" class="btn-login">
        Login
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="divider">
        <hr><span>New here?</span><hr>
      </div>

      <p class="register-link">
        Don't have an account? <a href="{% url 'register' %}">Register</a>
      </p>

    </form>
  </div>
</div>

<script>
  let captchaCode = '';

  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

  function randomChar() {
    return CHARS[Math.floor(Math.random() * CHARS.length)];
  }

  function generateCaptcha() {
    captchaCode = '';
    for (let i = 0; i < 6; i++) captchaCode += randomChar();

    drawCaptcha(captchaCode);
    document.getElementById('captcha-answer').value = '';
    document.getElementById('captcha-error').style.display = 'none';
  }

  function drawCaptcha(code) {
    const canvas = document.getElementById('captcha-canvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.fillStyle = '#eaf1f6';
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(Math.random() * W, Math.random() * H);
      ctx.lineTo(Math.random() * W, Math.random() * H);
      ctx.strokeStyle = `rgba(10,163,181,${(Math.random() * 0.25 + 0.08).toFixed(2)})`;
      ctx.lineWidth   = Math.random() * 1.5 + 0.5;
      ctx.stroke();
    }

    for (let i = 0; i < 30; i++) {
      ctx.beginPath();
      ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(58,74,92,${(Math.random() * 0.3 + 0.1).toFixed(2)})`;
      ctx.fill();
    }

    const charW  = W / (code.length + 1);
    const fonts  = ['Syne', 'DM Sans', 'serif', 'monospace'];
    const colors = ['#0aa3b5', '#088a9a', '#0d1b2a', '#3a4a5c', '#1a6e7a'];

    for (let i = 0; i < code.length; i++) {
      ctx.save();

      const x    = charW * (i + 0.9) + Math.random() * 4 - 2;
      const y    = H / 2 + Math.random() * 6 - 3;
      const angle = (Math.random() - 0.5) * 0.45;
      const size  = Math.floor(Math.random() * 6) + 18;

      ctx.translate(x, y);
      ctx.rotate(angle);

      ctx.font        = `${Math.random() > 0.5 ? 'bold ' : ''}${size}px ${fonts[Math.floor(Math.random() * fonts.length)]}`;
      ctx.fillStyle   = colors[Math.floor(Math.random() * colors.length)];
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';

      ctx.shadowColor   = 'rgba(10,163,181,0.15)';
      ctx.shadowBlur    = 2;
      ctx.shadowOffsetX = Math.random() * 2 - 1;
      ctx.shadowOffsetY = Math.random() * 2 - 1;

      ctx.fillText(code[i], 0, 0);
      ctx.restore();
    }
  }

  document.getElementById('login-form').addEventListener('submit', function(e) {
    const userInput = document.getElementById('captcha-answer').value.trim().toUpperCase();
    if (userInput !== captchaCode) {
      e.preventDefault();
      document.getElementById('captcha-error').style.display = 'block';
      generateCaptcha();
    }
  });

  generateCaptcha();
</script>

</body>
</html>
